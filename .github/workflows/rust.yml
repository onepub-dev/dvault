name: Rust

on:
  push:
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Agent IPC smoke test
        run: cargo test -p lockbox_cli --test agent_flow -- --ignored

      - name: Check fuzz targets
        run: cargo check --manifest-path fuzz/Cargo.toml

  fuzz-smoke:
    name: fuzz smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/fuzz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz smoke targets
        run: |
          cargo fuzz run header -- -runs=1
          cargo fuzz run key_directory -- -runs=1
          cargo fuzz run pages_recovery -- -runs=1
          cargo fuzz run paths -- -runs=1
