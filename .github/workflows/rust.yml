name: Rust

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LOCKBOX_COMPRESSION_CORPUS_VERSION: v1

on:
  push:
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Required checks
        run: bash tools/check_required.sh

      - name: Agent IPC smoke test
        run: cargo test -p lockbox_cli --test agent_flow -- --ignored

      - name: Check fuzz targets
        run: cargo check --manifest-path fuzz/Cargo.toml

  portable-core:
    name: core ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-linux-android
          - os: ubuntu-latest
            target: wasm32-unknown-unknown
          - os: ubuntu-latest
            target: wasm32-wasip2
          - os: macos-latest
            target: aarch64-apple-ios

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: portable-core-${{ matrix.target }}

      - name: Check core
        run: cargo check -p lockbox_core --target ${{ matrix.target }}

      - name: Check secure tests
        if: matrix.target != 'wasm32-unknown-unknown'
        run: cargo check -p lockbox_secure --target ${{ matrix.target }} --tests

      - name: Check secure web library
        if: matrix.target == 'wasm32-unknown-unknown'
        run: cargo check -p lockbox_secure --target ${{ matrix.target }} --lib

  compression-regression:
    name: compression regression corpus
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore compression corpus
        id: compression-corpus-cache
        uses: actions/cache@v4
        with:
          path: rust/.ci-compression-corpus
          key: lockbox-compression-corpus-${{ env.LOCKBOX_COMPRESSION_CORPUS_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: compression-regression

      - name: Generate compression corpus
        if: steps.compression-corpus-cache.outputs.cache-hit != 'true'
        run: cargo run --release -p lockbox_core --example compression_corpus -- .ci-compression-corpus

      - name: Run compression regression corpus
        env:
          LOCKBOX_COMPRESSION_CORPUS_DIR: ${{ github.workspace }}/rust/.ci-compression-corpus
        run: cargo test --release -p lockbox_core --test compression_regression -- --ignored --nocapture
