name: Endian Interop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LOCKBOX_INTEROP_FIXTURE_VERSION: v2

on:
  push:
    paths:
      - "rust/**"
      - ".github/workflows/endian-interop.yml"
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/endian-interop.yml"
  workflow_dispatch:

jobs:
  create-x64:
    name: prepare Linux x64 fixture
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore cached x64 fixture
        id: x64-fixture-cache
        uses: actions/cache@v4
        with:
          path: interop-cache/lockbox-x64.lbx
          key: lockbox-endian-x64-${{ env.LOCKBOX_INTEROP_FIXTURE_VERSION }}

      - name: Install Rust
        if: steps.x64-fixture-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        if: steps.x64-fixture-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: endian-create-x64

      - name: Create x64 fixture
        if: steps.x64-fixture-cache.outputs.cache-hit != 'true'
        env:
          LOCKBOX_INTEROP_CREATE_PATH: ${{ github.workspace }}/interop-cache/lockbox-x64.lbx
        run: cargo test --release -p lockbox_core --test endian_interop -- --ignored --nocapture

      - name: Upload x64 fixture
        uses: actions/upload-artifact@v4
        with:
          name: lockbox-x64
          path: interop-cache/lockbox-x64.lbx
          if-no-files-found: error

  verify-x64-on-linux-arm:
    name: verify x64 fixture on Linux arm64
    runs-on: ubuntu-24.04-arm
    needs: create-x64

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download x64 fixture
        uses: actions/download-artifact@v4
        with:
          name: lockbox-x64
          path: interop

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: endian-linux-arm

      - name: Verify x64 fixture and create arm64 fixture
        env:
          LOCKBOX_INTEROP_VERIFY_PATH: ${{ github.workspace }}/interop/lockbox-x64.lbx
          LOCKBOX_INTEROP_CREATE_PATH: ${{ runner.temp }}/lockbox-linux-arm64.lbx
        run: cargo test --release -p lockbox_core --test endian_interop -- --ignored --nocapture

      - name: Upload Linux arm64 fixture
        uses: actions/upload-artifact@v4
        with:
          name: lockbox-linux-arm64
          path: ${{ runner.temp }}/lockbox-linux-arm64.lbx
          if-no-files-found: error

  verify-linux-arm-on-x64:
    name: verify Linux arm64 fixture on Linux x64
    runs-on: ubuntu-latest
    needs: verify-x64-on-linux-arm

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux arm64 fixture
        uses: actions/download-artifact@v4
        with:
          name: lockbox-linux-arm64
          path: interop

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: endian-verify-arm-on-x64

      - name: Verify Linux arm64 fixture
        env:
          LOCKBOX_INTEROP_VERIFY_PATH: ${{ github.workspace }}/interop/lockbox-linux-arm64.lbx
        run: cargo test --release -p lockbox_core --test endian_interop -- --ignored --nocapture

  verify-x64-on-macos-arm:
    name: verify x64 fixture on macOS arm64
    runs-on: macos-latest
    needs: create-x64

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download x64 fixture
        uses: actions/download-artifact@v4
        with:
          name: lockbox-x64
          path: interop

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: endian-macos-arm

      - name: Verify x64 fixture
        env:
          LOCKBOX_INTEROP_VERIFY_PATH: ${{ github.workspace }}/interop/lockbox-x64.lbx
        run: cargo test --release -p lockbox_core --test endian_interop -- --ignored --nocapture

  big-endian-s390x:
    name: verify x64 fixture on s390x and create s390x fixture
    runs-on: ubuntu-latest
    needs: create-x64
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download x64 fixture
        uses: actions/download-artifact@v4
        with:
          name: lockbox-x64
          path: interop

      - name: Restore cached s390x fixture
        id: s390x-fixture-cache
        uses: actions/cache@v4
        with:
          path: interop/lockbox-s390x.lbx
          key: lockbox-endian-s390x-${{ env.LOCKBOX_INTEROP_FIXTURE_VERSION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: s390x

      - name: Verify x64 fixture and create s390x fixture
        if: steps.s390x-fixture-cache.outputs.cache-hit != 'true'
        run: >
          docker run --rm --platform linux/s390x
          -u "$(id -u):$(id -g)"
          -v "${{ github.workspace }}:/work"
          -w /work/rust
          -e CARGO_HOME=/tmp/cargo
          -e CARGO_TARGET_DIR=/tmp/target
          -e LOCKBOX_INTEROP_VERIFY_PATH=/work/interop/lockbox-x64.lbx
          -e LOCKBOX_INTEROP_CREATE_PATH=/work/interop/lockbox-s390x.lbx
          rust:1-bookworm
          bash -lc "export PATH=/usr/local/cargo/bin:/usr/local/rustup/bin:$PATH; cargo test --release -p lockbox_core --test endian_interop -- --ignored --nocapture"

      - name: Verify x64 fixture on s390x
        if: steps.s390x-fixture-cache.outputs.cache-hit == 'true'
        run: >
          docker run --rm --platform linux/s390x
          -u "$(id -u):$(id -g)"
          -v "${{ github.workspace }}:/work"
          -w /work/rust
          -e CARGO_HOME=/tmp/cargo
          -e CARGO_TARGET_DIR=/tmp/target
          -e LOCKBOX_INTEROP_VERIFY_PATH=/work/interop/lockbox-x64.lbx
          rust:1-bookworm
          bash -lc "export PATH=/usr/local/cargo/bin:/usr/local/rustup/bin:$PATH; cargo test --release -p lockbox_core --test endian_interop -- --ignored --nocapture"

      - name: Upload s390x fixture
        uses: actions/upload-artifact@v4
        with:
          name: lockbox-s390x
          path: interop/lockbox-s390x.lbx
          if-no-files-found: error

  verify-s390x-on-x64:
    name: verify s390x fixture on Linux x64
    runs-on: ubuntu-latest
    needs: big-endian-s390x

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download s390x fixture
        uses: actions/download-artifact@v4
        with:
          name: lockbox-s390x
          path: interop

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: endian-verify-s390x-on-x64

      - name: Verify s390x fixture
        env:
          LOCKBOX_INTEROP_VERIFY_PATH: ${{ github.workspace }}/interop/lockbox-s390x.lbx
        run: cargo test --release -p lockbox_core --test endian_interop -- --ignored --nocapture
